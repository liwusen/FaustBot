<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faust 配置中心</title>
  <link rel="stylesheet" href="config-window.css" />
</head>
<body>
  <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">F</div>
        <div>
          <h1>Faust 控制台</h1>
          <p>配置 / Agent / 重载</p>
        </div>
      </div>
      <nav class="nav" id="navList">
        <button class="nav-item active" data-tab="overview">概览</button>
        <button class="nav-item" data-tab="providers">AI Provider</button>
        <button class="nav-item" data-tab="agent">Agent 管理</button>
        <button class="nav-item" data-tab="live2d">Live2D</button>
        <button class="nav-item" data-tab="runtime">运行控制</button>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">概览</h2>
          <p id="pageSubtitle">查看当前运行状态与关键配置</p>
        </div>
        <div class="topbar-actions">
          <button id="refreshAllBtn" class="ghost-btn">刷新</button>
          <button id="saveAllBtn" class="primary-btn">保存配置</button>
        </div>
      </header>

      <section class="panel active" data-panel="overview">
        <div class="cards two-col">
          <article class="card stat-card">
            <h3>当前 Agent</h3>
            <div id="currentAgentStat" class="stat-value">-</div>
            <p class="muted">正在运行的 Agent 与配置同步</p>
          </article>
          <article class="card stat-card">
            <h3>默认 Live2D 模型</h3>
            <div id="currentModelStat" class="stat-value">-</div>
            <p class="muted">保存后可在前端窗口应用</p>
          </article>
        </div>
        <br>
        <hr>
        <div class="card">
          <h3>运行状态</h3>
          <pre id="runtimeSummary" class="json-view">加载中...</pre>
        </div>
      </section>

      <section class="panel" data-panel="providers">
        <div class="cards two-col">
          <article class="card">
            <h3>公开配置</h3>
            <div class="form-grid" id="publicConfigForm"></div>
          </article>
          <article class="card">
            <h3>API KEY 设置</h3>
            <div class="form-grid" id="privateConfigForm"></div>
          </article>
        </div>
      </section>

      <section class="panel" data-panel="agent">
        <div class="cards agents-layout">
          <article class="card agent-list-card">
            <div class="section-header">
              <h3>Agent 列表</h3>
              <button id="createAgentBtn" class="ghost-btn">新建 Agent</button>
            </div>
            <div id="agentList" class="agent-list"></div>
          </article>
          <article class="card agent-editor-card">
            <div class="section-header wrap">
              <div>
                <h3 id="agentEditorTitle">Agent 文件</h3>
                <p id="agentEditorSubtitle" class="muted">请选择一个 Agent</p>
              </div>
              <div class="editor-actions">
                <button id="switchAgentBtn" class="ghost-btn" disabled>切换为当前 Agent</button>
                <button id="deleteAgentBtn" class="danger-btn" disabled>删除 Agent</button>
                <button id="saveAgentFilesBtn" class="primary-btn" disabled>保存 Agent 文件</button>
              </div>
            </div>
            <div id="agentFilesTabs" class="subtabs"></div>
            <textarea id="agentFileEditor" class="code-editor" placeholder="请选择 Agent 文件"></textarea>
          </article>
        </div>
      </section>

      <section class="panel" data-panel="live2d">
        <div class="cards two-col">
          <article class="card">
            <h3>显示设置</h3>
            <div class="form-grid" id="live2dConfigForm"></div>
          </article>
          <article class="card">
            <h3>模型列表</h3>
            <div id="modelList" class="model-list"></div>
          </article>
        </div>
      </section>

      <section class="panel" data-panel="runtime">
        <div class="cards two-col">
          <article class="card">
            <h3>运行控制</h3>
            <div class="button-stack">
              <button id="reloadAgentBtn" class="ghost-btn">重建 Agent Runtime</button>
              <button id="reloadAllBtn" class="primary-btn">重载配置并重建 Runtime</button>
            </div>
            <hr>
            <h3>后端服务管理</h3>
            <div id="serviceList" class="model-list"></div>
          </article>
          <article class="card">
            <h3>消息</h3>
            <div id="feedbackBox" class="feedback-box">等待操作…</div>
            <h3>服务日志</h3>
            <pre id="serviceLogView" class="json-view">请选择服务查看日志…</pre>
          </article>
        </div>
      </section>
    </main>
  </div>

  <dialog id="createAgentDialog" class="modal">
    <form method="dialog" id="createAgentForm">
      <h3>新建 Agent</h3>
      <label>
        <span>Agent 名称</span>
        <input id="newAgentName" name="agent_name" required placeholder="例如：new-agent" />
      </label>
      <label>
        <span>复制模板（可选）</span>
        <select id="newAgentTemplate" name="template_agent"></select>
      </label>
      <div class="dialog-actions">
        <button value="cancel" class="ghost-btn" type="button" id="cancelCreateAgentBtn">取消</button>
        <button value="submit" class="primary-btn" type="submit">创建</button>
      </div>
    </form>
  </dialog>

  <script src="config-window.js"></script>
</body>
</html>
