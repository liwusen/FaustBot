<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faust Plugin Market</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__inner">
        <h1>Faust Plugin Market</h1>
        <p>发现、预览并一键安装 Faust 插件</p>
        <div class="search-wrap">
          <input id="searchInput" type="search" placeholder="搜索插件名称 / 描述 / 标签..." />
        </div>
      </div>
    </header>

    <main class="container">
      <section id="metaInfo" class="meta"></section>
      <section id="pluginGrid" class="grid"></section>
      <section id="emptyState" class="empty hidden">没有找到匹配的插件。</section>
    </main>

    <dialog id="previewDialog" class="preview">
      <article>
        <button id="closePreview" class="preview__close" aria-label="关闭">×</button>
        <h2 id="previewTitle"></h2>
        <p id="previewDesc"></p>
        <div id="previewMeta" class="preview__meta"></div>
        <div class="preview__actions">
          <a id="previewInstall" class="btn btn--primary" href="#">使用 Faust 安装</a>
          <a id="previewDownload" class="btn" href="#" target="_blank" rel="noopener">下载插件包</a>
          <a id="previewRepo" class="btn" href="#" target="_blank" rel="noopener">查看仓库</a>
        </div>
      </article>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
